name: Deploy Cloud App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t cloud-devops-app .

      - name: Run Container
        run: docker run -d -p 5000:5000 cloud-devops-app
